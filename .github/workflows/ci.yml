name: CI

on:
    push:
      branches: ["**"]
    pull_request:

jobs:
    build:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: app
      steps:
        - uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "20.x"
            cache: "npm"
            cache-dependency-path: app/package-lock.json

        - name: Install dependencies
          run: npm ci

        - name: Lint
          run: npm run lint

        - name: Test
          run: npm test
          continue-on-error: true

        - name: Build
          run: npm run build

        - name: Lint
          run: npm run lint

        - name: Test
          run: npm test
          continue-on-error: true

        - name: Build
          run: npm run build
